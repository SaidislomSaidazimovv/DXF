name: Contract validation

# Har push va PR da ishlaydi. Schema buzilsa, build BLOCKED.
# CONVENTIONS.md §10: "Operationsda yo'q = mavjud emas" qoidasi shu yerda kuchga kiradi.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Schemas + Fixtures + Transform math
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema ezdxf

      - name: Validate JSON schemas + fixtures + foreign keys
        run: python tests/validate_contracts.py

      - name: Verify transform math (CONVENTIONS §3 vs apply_transform)
        run: python tests/verify_transform_math.py

      - name: Schema migration test (build_cabinet output → schema)
        run: python tests/test_schema_migration.py

  pipeline:
    name: End-to-end pipeline tests
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema ezdxf

      - name: Transform unit tests
        run: python test_transform.py

      - name: Basic DXF (2 mirrored side panels)
        run: python test_dxf.py

      - name: Rotation DXF (4 rotations on one sheet)
        run: python test_rotation.py

      - name: Edge banding DXF (4 banding configs)
        run: python test_banding.py

      - name: Single cabinet → DXF
        run: python test_cabinet.py

      - name: Multi-cabinet kitchen → DXF (with run-time validate_parts)
        run: python test_project.py

      - name: 3D HTML preview generation
        run: python test_3d.py

      - name: DXF entity verification (read back all outputs)
        run: python verify_outputs.py
